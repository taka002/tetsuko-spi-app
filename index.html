<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#111;
  color:#fff;
}
body.light{ background:#f5f5f5; color:#111; }
body.blue{ background:#0d1b2a; color:#fff; }

.header{
  padding:15px;
  text-align:center;
  background:#1c1c1c;
}

.main{
  padding:15px;
  padding-bottom:80px;
}

.card{
  background:#222;
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
}

body.light .card{ background:#fff; }
body.blue .card{ background:#1b263b; }

.btn{
  background:#4caf50;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  text-align:center;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1c1c1c;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.nav div{
  color:#aaa;
  font-size:12px;
}

.active{
  color:#4caf50;
}

input, select{
  width:100%;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

#explain{
  margin-top:10px;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="header">📱 徹子AI</div>
<div class="main" id="screen"></div>

<div class="nav">
  <div onclick="changeTab('home', this)" class="active">🏠<br>ホーム</div>
  <div onclick="changeTab('study', this)">📚<br>学習</div>
  <div onclick="changeTab('ai', this)">🤖<br>AI</div>
  <div onclick="changeTab('setting', this)">⚙️<br>設定</div>
</div>

<script>
// ===== 設定 =====
let settings = JSON.parse(localStorage.getItem("settings")) || {
  theme:"dark",
  personality:"normal",
  examDate:"",
  voice:true
};

// ===== 音声 =====
function speakText(text){
  if(!settings.voice) return;

  const uttr = new SpeechSynthesisUtterance(text);
  uttr.lang = "ja-JP";

  uttr.pitch =
    settings.personality==="strict" ? 0.8 :
    settings.personality==="friend" ? 1.4 : 1.2;

  speechSynthesis.speak(uttr);
}

// ===== 問題 =====
let questions = [
  { q:"3 + 5 = ?", choices:["6","7","8","9"], correct:2, explanation:"3+5=8です" }
];

let current = 0;

// ===== 画面 =====
function changeTab(tab, el){
  let html = "";

  if(tab==="home"){
    html = `
    <div class="card">
      <h3>今日の一言</h3>
      <p>今日も一歩進みましょう</p>
    </div>`;
  }

  if(tab==="study"){
    const q = questions[current];

    html = `
    <div class="card">
      <h3>問題</h3>
      <p>${q.q}</p>

      ${q.choices.map((c,i)=>
        `<div class="btn" onclick="answer(${i})">${c}</div>`
      ).join("")}

      <p id="result"></p>
      <div id="explain"></div>

      <div class="btn" onclick="aiExplain()">🤖 AI解説</div>

      <!-- 🔥 ①画像 -->
      <input type="file" accept="image/*" onchange="analyzeImage(this)">
      <div class="btn" onclick="alert('画像を選んで')">📸 画像で解説</div>

      <!-- 🔥 ②カメラ -->
      <input type="file" accept="image/*" capture="environment" onchange="analyzeImage(this)">
      <div class="btn">📷 カメラで解説</div>

      <!-- 深掘り -->
      <input id="deepInput" placeholder="どこが分からない？">
      <div class="btn" onclick="deepExplain()">🔍 深掘り</div>

      <div class="btn" onclick="nextQuestion()">次</div>
    </div>`;
  }

  document.getElementById("screen").innerHTML = html;
  document.querySelectorAll(".nav div").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
}

// ===== 判定 =====
function answer(i){
  const q = questions[current];

  if(i===q.correct){
    document.getElementById("result").innerText="⭕ 正解";
    speakText("正解よ");
  }else{
    document.getElementById("result").innerText="❌ 不正解";
    speakText("違うわね");
  }

  document.getElementById("explain").innerHTML=q.explanation;
}

// ===== AI解説 =====
async function aiExplain(){
  const q = questions[current];

  document.getElementById("explain").innerText="AI解説中...";

  const res = await fetch("/api/explain",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      question: q.q
    })
  });

  const data = await res.json();
  document.getElementById("explain").innerHTML=data.reply;
  speakText(data.reply);
}

// ===== 🔥①② 画像解析 =====
async function analyzeImage(input){

  const file = input.files[0];
  if(!file){
    alert("画像選んで");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(){
    const base64 = reader.result;

    document.getElementById("explain").innerText="画像解析中...";

    const res = await fetch("/api/vision",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        image: base64,
        question: "この問題を分かりやすく解説して"
      })
    });

    const data = await res.json();

    document.getElementById("explain").innerHTML=data.reply;
    speakText(data.reply);
  };

  reader.readAsDataURL(file);
}

// ===== 深掘り =====
async function deepExplain(){
  const q = questions[current];
  const userQ = document.getElementById("deepInput").value;

  document.getElementById("explain").innerText="深掘り中...";

  const res = await fetch("/api/explain",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      question: `
問題:${q.q}
質問:${userQ}
図や表で説明して
`
    })
  });

  const data = await res.json();

  document.getElementById("explain").innerHTML=data.reply;
  speakText(data.reply);
}

// ===== 次 =====
function nextQuestion(){
  changeTab("study", document.querySelectorAll(".nav div")[1]);
}

// 初期
changeTab("home", document.querySelector(".nav div"));
</script>

</body>
</html>
