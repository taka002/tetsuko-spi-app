<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,#1e1e2f,#0f2027);
  color:#fff;
}

/* ヘッダー */
.header{
  padding:18px;
  text-align:center;
  font-size:18px;
  font-weight:600;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

/* メイン */
.main{
  padding:15px;
  padding-bottom:90px;
}

/* カード */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:25px;
  padding:20px;
  margin-bottom:15px;
  box-shadow:
    0 10px 25px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.1);
}

/* タイトル */
.card h3{
  margin:0 0 10px;
  font-size:18px;
}

/* テキスト */
.card p{
  font-size:15px;
  opacity:0.9;
}

/* ボタン */
.btn{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  padding:14px;
  border-radius:15px;
  margin-top:12px;
  text-align:center;
  font-weight:600;
  box-shadow:0 6px 15px rgba(0,0,0,0.3);
  transition:0.2s;
}

.btn:active{
  transform:scale(0.96);
}

/* 入力 */
input{
  width:100%;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

/* ナビ */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.nav div{
  color:#aaa;
  font-size:12px;
}

.active{
  color:#00f2fe;
}

#explain{
  margin-top:10px;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="header">📱 徹子AI</div>
<div class="main" id="screen"></div>

<div class="nav">
  <div onclick="changeTab('home', this)" class="active">🏠<br>ホーム</div>
  <div onclick="changeTab('study', this)">📚<br>学習</div>
  <div onclick="changeTab('ai', this)">🤖<br>AI</div>
  <div onclick="changeTab('setting', this)">⚙️<br>設定</div>
</div>

<script>
// ===== 設定 =====
let settings = JSON.parse(localStorage.getItem("settings")) || {
  voice:true
};

// ===== 音声 =====
function speakText(text){
  if(!settings.voice) return;
  const uttr = new SpeechSynthesisUtterance(text);
  uttr.lang="ja-JP";
  uttr.pitch=1.2;
  speechSynthesis.speak(uttr);
}

// ===== 問題 =====
let questions=[
  {q:"3 + 5 = ?",choices:["6","7","8","9"],correct:2,explanation:"3+5=8です"}
];

let current=0;

// ===== 画面 =====
function changeTab(tab,el){
  let html="";

  if(tab==="home"){
    html=`
    <div class="card">
      <h3>今日の一言</h3>
      <p>今日も一歩進みましょう</p>
    </div>`;
  }

  if(tab==="study"){
    const q=questions[current];

    html=`
    <div class="card">
      <h3>問題</h3>
      <p>${q.q}</p>

      ${q.choices.map((c,i)=>
        `<div class="btn" onclick="answer(${i})">${c}</div>`
      ).join("")}

      <p id="result"></p>
      <div id="explain"></div>

      <div class="btn" onclick="aiExplain()">🤖 AI解説</div>

      <input type="file" accept="image/*" onchange="analyzeImage(this)">
      <div class="btn" onclick="alert('画像選んで')">📸 画像で解説</div>

      <input type="file" accept="image/*" capture="environment" onchange="analyzeImage(this)">
      <div class="btn">📷 カメラ</div>

      <input id="deepInput" placeholder="どこが分からない？">
      <div class="btn" onclick="deepExplain()">🔍 深掘り</div>

      <div class="btn" onclick="nextQuestion()">次</div>
    </div>`;
  }

  document.getElementById("screen").innerHTML=html;
  document.querySelectorAll(".nav div").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
}

// ===== 判定 =====
function answer(i){
  const q=questions[current];

  if(i===q.correct){
    result.innerText="⭕ 正解";
    speakText("正解よ");
  }else{
    result.innerText="❌ 不正解";
    speakText("違うわね");
  }

  explain.innerHTML=q.explanation;
}

// ===== AI =====
async function aiExplain(){
  const q=questions[current];
  explain.innerText="AI解説中...";

  const res=await fetch("/api/explain",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({question:q.q})
  });

  const data=await res.json();
  explain.innerHTML=data.reply;
  speakText(data.reply);
}

// ===== 画像 =====
async function analyzeImage(input){
  const file=input.files[0];
  if(!file){alert("画像選んで");return;}

  const reader=new FileReader();

  reader.onload=async function(){
    explain.innerText="解析中...";

    const res=await fetch("/api/vision",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        image:reader.result,
        question:"この問題を解説して"
      })
    });

    const data=await res.json();
    explain.innerHTML=data.reply;
    speakText(data.reply);
  };

  reader.readAsDataURL(file);
}

// ===== 深掘り =====
async function deepExplain(){
  const q=questions[current];
  const userQ=document.getElementById("deepInput").value;

  explain.innerText="深掘り中...";

  const res=await fetch("/api/explain",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      question:`問題:${q.q} 質問:${userQ}`
    })
  });

  const data=await res.json();
  explain.innerHTML=data.reply;
  speakText(data.reply);
}

// ===== 次 =====
function nextQuestion(){
  changeTab("study",document.querySelectorAll(".nav div")[1]);
}

// 初期
changeTab("home",document.querySelector(".nav div"));
</script>

</body>
</html>
