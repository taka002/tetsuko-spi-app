<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI SPI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#1f2a44,#0a3d62,#0f2027);
  color:#fff;
}

.header{
  padding:16px;
  text-align:center;
  background:rgba(255,255,255,0.05);
}

.main{
  padding:15px;
  padding-bottom:100px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
}

.btn{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  padding:16px;
  border-radius:15px;
  margin-top:12px;
  text-align:center;
}

.btn.disabled{
  opacity:0.5;
  pointer-events:none;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}
</style>
</head>

<body>

<div class="header">📱 徹子AI SPI</div>
<div class="main" id="screen"></div>

<div class="nav">
  <div onclick="changeTab('home')">🏠</div>
  <div onclick="changeTab('study')">📚</div>
  <div onclick="showWeak()">📊</div>
</div>

<script>

// ===== 画面取得 =====
const screen = document.getElementById("screen");

// ===== データ =====
let combo = 0;
let currentQ = null;
let answered = false;

// ===== 苦手分析 =====
function recordWeak(type,ok){
  let d = JSON.parse(localStorage.getItem("weak")) || {
    calc:{ok:0,ng:0},
    percent:{ok:0,ng:0},
    ratio:{ok:0,ng:0}
  };

  if(ok) d[type].ok++;
  else d[type].ng++;

  localStorage.setItem("weak",JSON.stringify(d));
}

function showWeak(){
  let d = JSON.parse(localStorage.getItem("weak")) || {};
  let html = "<div class='card'><h2>苦手分析</h2>";

  Object.keys(d).forEach(k=>{
    let t = d[k].ok + d[k].ng;
    let r = t ? Math.floor(d[k].ok/t*100) : 0;
    html += `<p>${k} : ${r}%</p>`;
  });

  html += "</div>";
  screen.innerHTML = html;
}

// ===== 問題生成 =====
function makeQ(q,correct,type,exp){
  let choices=[correct,correct+1,correct-1,correct+2]
    .sort(()=>Math.random()-0.5);

  return {
    q,
    choices,
    correct:choices.indexOf(correct),
    type,
    exp
  };
}

function genMath(){
  const type=Math.floor(Math.random()*3);

  if(type===0){
    let a=Math.floor(Math.random()*20)+10;
    let b=Math.floor(Math.random()*20)+10;
    return makeQ(`${a}+${b}=?`,a+b,"calc",`${a}+${b}=${a+b}`);
  }

  if(type===1){
    let base=1000;
    let per=20;
    return makeQ(`${base}の${per}%は？`,base*per/100,"percent",`${base}×${per}%=${base*per/100}`);
  }

  if(type===2){
    return makeQ(`A:B=2:3 合計50 Aは？`,20,"ratio","50×2/(2+3)=20");
  }
}

function getQ(){
  return genMath();
}

// ===== 画面 =====
function changeTab(tab){

  if(tab==="home"){
    screen.innerHTML=`
    <div class="card">
      <h2>SPIトレーニング</h2>
      <p>🔥 連続正解：${combo}</p>
      <div class="btn" onclick="changeTab('study')">▶ 学習開始</div>
    </div>`;
  }

  if(tab==="study"){
    let q=getQ();
    currentQ=q;
    answered=false;

    screen.innerHTML=`
    <div class="card">
      <h2>${q.q}</h2>

      ${q.choices.map((c,i)=>
        `<div class="btn" onclick="answer(${i})">${c}</div>`
      ).join("")}

      <div class="btn" onclick="answer('skip')">🤔 分からない</div>

      <p id="result"></p>
    </div>`;
  }
}

// ===== 回答 =====
function answer(i){

  if(answered) return;
  answered=true;

  const result=document.getElementById("result");

  document.querySelectorAll(".btn").forEach(b=>{
    b.classList.add("disabled");
  });

  if(i==="skip"){
    combo=0;
    result.innerText="🤔 分からない\n";
    result.innerText+=currentQ.exp;
    recordWeak(currentQ.type,false);
  }
  else if(i===currentQ.correct){
    combo++;
    result.innerText=`⭕ 正解（${combo}連続🔥）\n`;
    result.innerText+=currentQ.exp;
    recordWeak(currentQ.type,true);
  }
  else{
    combo=0;
    result.innerText="❌ 不正解\n";
    result.innerText+=currentQ.exp;
    recordWeak(currentQ.type,false);
  }

  result.innerHTML+=`
    <div class="btn" onclick="changeTab('study')">次の問題 ▶</div>
  `;
}

// ===== 初期表示 =====
changeTab("home");

</script>

</body>
</html>
