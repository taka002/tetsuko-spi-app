<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,#1e1e2f,#0f2027);
  color:#fff;
}

/* ===== スプラッシュ ===== */
#splash{
  position:fixed;width:100%;height:100%;
  background:linear-gradient(#0f2027,#203a43);
  display:flex;justify-content:center;align-items:center;
  z-index:9999;
}
.glow{
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,#00f2fe,transparent);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{transform:scale(0.8);}
  50%{transform:scale(1.3);}
  100%{transform:scale(0.8);}
}

/* ===== UI ===== */
.header{
  padding:18px;text-align:center;
  background:rgba(255,255,255,0.05);
  font-weight:600;
}

.main{padding:15px;padding-bottom:100px;}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.btn{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  padding:16px;
  border-radius:15px;
  margin-top:12px;
  text-align:center;
  font-size:16px;
  font-weight:600;
}

.btn:active{transform:scale(0.96);}

.progress{
  height:10px;
  background:#333;
  border-radius:10px;
  margin-top:10px;
}

.bar{
  height:100%;
  background:linear-gradient(90deg,#00f2fe,#4facfe);
  border-radius:10px;
}

/* ===== 演出 ===== */
#levelUp{
  position:fixed;width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;justify-content:center;align-items:center;
  z-index:9999;
}

#stamp{
  position:fixed;
  top:40%;left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  font-size:90px;
  opacity:0;
  transition:0.3s;
}

/* ===== ナビ ===== */
.nav{
  position:fixed;bottom:0;width:100%;
  background:#111;
  display:flex;justify-content:space-around;
  padding:10px 0;
}
.nav div{color:#aaa;}
.active{color:#00f2fe;}
</style>
</head>

<body>

<!-- スプラッシュ -->
<div id="splash" onclick="startApp()">
  <div style="text-align:center">
    <div class="glow"></div>
    <h1>徹子AI</h1>
    <p>タップして開始</p>
  </div>
</div>

<!-- レベルアップ -->
<div id="levelUp">
  <div class="card">
    <h2>🎉 LEVEL UP</h2>
    <p id="levelText"></p>
  </div>
</div>

<!-- スタンプ -->
<div id="stamp"></div>

<div class="header">📱 徹子AI</div>
<div class="main" id="screen"></div>

<div class="nav">
  <div onclick="changeTab('home', this)" class="active">🏠</div>
  <div onclick="changeTab('study', this)">📚</div>
</div>

<script>

// ===== 音声 =====
function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

// ===== 起動 =====
function startApp(){
  speak("こんにちは、徹子です");
  splash.style.display="none";

  // 🔥 ここ重要（空画面防止）
  render();
}

// ===== データ =====
let user = JSON.parse(localStorage.getItem("user")) || {xp:0,level:1};
let combo = 0;

// ===== XP =====
function nextXP(){ return user.level * 50; }

function addXP(v){
  user.xp += v;

  if(user.xp >= nextXP()){
    user.xp = 0;
    user.level++;
    showLevelUp();
  }

  save();
}

// ===== バッジ =====
function getBadge(){
  if(user.level>=50) return "👑 神";
  if(user.level>=10) return "🔥 中級者";
  if(user.level>=5) return "💪 頑張り屋";
  return "🌱 初心者";
}

// ===== レベルアップ =====
function showLevelUp(){
  levelText.innerText="Lv."+user.level;
  levelUp.style.display="flex";
  speak("レベルアップよ");
  setTimeout(()=>levelUp.style.display="none",1500);
}

// ===== スタンプ =====
function showStamp(t){
  stamp.innerText=t;
  stamp.style.opacity=1;
  stamp.style.transform="translate(-50%,-50%) scale(1.5)";
  setTimeout(()=>{
    stamp.style.opacity=0;
    stamp.style.transform="translate(-50%,-50%) scale(0.5)";
  },400);
}

// ===== デイリー =====
function getDaily(){
  const today=new Date().toDateString();
  let d=JSON.parse(localStorage.getItem("daily"))||{date:today,count:0,done:false};

  if(d.date!==today){
    d={date:today,count:0,done:false};
  }

  localStorage.setItem("daily",JSON.stringify(d));
  return d;
}

function addDaily(){
  let d=getDaily();
  d.count++;

  if(d.count>=5 && !d.done){
    d.done=true;
    showStamp("🎉");
    speak("ミッション達成よ");
    addXP(20);
  }

  localStorage.setItem("daily",JSON.stringify(d));
}

// ===== 問題 =====
let questions=[
  {q:"3 + 5 = ?",choices:["6","7","8","9"],correct:2,explanation:"3+5=8です"}
];

let current=0;

// ===== 画面 =====
function changeTab(tab,el){
  let html="";
  const percent=Math.floor((user.xp/nextXP())*100);
  const daily=getDaily();

  if(tab==="home"){
    html=`

    <div class="card">
      <h2>Lv.${user.level} ${getBadge()}</h2>
      <p>あと ${nextXP()-user.xp} XP</p>
      <div class="progress">
        <div class="bar" style="width:${percent}%"></div>
      </div>
    </div>

    <div class="card">
      <h3>🔥 デイリー</h3>
      <p>${daily.count}/5 問（あと ${5-daily.count}）</p>
      <div class="progress">
        <div class="bar" style="width:${daily.count*20}%"></div>
      </div>
      ${daily.done ? "<p>🎉 達成済み！</p>" : ""}
    </div>

    <div class="card">
      <h3>💬 徹子の一言</h3>
      <p>今日も一歩進みましょう</p>
    </div>

    <div class="btn" onclick="changeTab('study', document.querySelectorAll('.nav div')[1])">
      ▶ 学習スタート
    </div>
    `;
  }

  if(tab==="study"){
    const q=questions[current];

    html=`
    <div class="card" style="padding:30px;">
      <h2>${q.q}</h2>

      ${q.choices.map((c,i)=>
        `<div class="btn" onclick="answer(${i})">${c}</div>`
      ).join("")}

      <p id="result" style="font-size:22px;margin-top:10px;"></p>
      <p>${q.explanation}</p>

      <p>🔥 コンボ ${combo}</p>
    </div>
    `;
  }

  screen.innerHTML=html;
  document.querySelectorAll(".nav div").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
}

// ===== 判定 =====
function answer(i){
  const q=questions[current];

  if(i===q.correct){
    result.innerText="⭕ 正解";
    combo++;
    addXP(10 + combo);
    showStamp("⭕");
    speak("正解");
  }else{
    result.innerText="❌";
    combo=0;
    addXP(2);
    showStamp("❌");
  }

  addDaily();
  render();
}

// ===== 保存 =====
function save(){
  localStorage.setItem("user",JSON.stringify(user));
}

// ===== 初期描画（←削除しない） =====
function render(){
  changeTab("home",document.querySelector(".nav div"));
}

</script>
</body>
</html>
