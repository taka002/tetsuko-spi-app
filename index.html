<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI SPI</title><style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,#1f2a44,#0a3d62,#0f2027);
  color:#fff;
}

/* ヘッダー */
.header{
  padding:18px;
  text-align:center;
  background:rgba(255,255,255,0.05);
  font-size:20px;
}

/* メイン */
.main{
  padding:15px;
  padding-bottom:100px;
}

/* カード */
.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
}

/* ボタン */
.btn{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  padding:16px;
  border-radius:15px;
  margin-top:12px;
  text-align:center;
  font-weight:bold;
}

/* ナビ */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}
.active{color:#00f2fe;}
</style></head><body><div class="header">📱 徹子AI SPI</div>
<div class="main" id="screen"></div><div class="nav">
  <div onclick="showHome()" class="active">🏠</div>
  <div onclick="startGame()">📚</div>
</div><script>

// ===== 取得 =====
const screen = document.getElementById("screen");

// ===== ホーム =====
function showHome(){
  screen.innerHTML = `
    <div class="card">
      <h2>SPIトレーニング</h2>
      <p>モードを選んでスタート</p>

      <div class="btn" onclick="startGame()">▶ 学習開始</div>
    </div>
  `;
}

// ===== 問題 =====
function startGame(){

  let a = Math.floor(Math.random()*20)+1;
  let b = Math.floor(Math.random()*20)+1;
  let correct = a + b;

  let choices = [correct, correct+1, correct-1, correct+2]
    .sort(()=>Math.random()-0.5);

  screen.innerHTML = `
    <div class="card">
      <h2>${a} + ${b} = ?</h2>

      ${choices.map(c=>`
        <div class="btn" onclick="answer(${c},${correct})">${c}</div>
      `).join("")}

      <p id="result"></p>

      <div class="btn" onclick="startGame()">次の問題 ▶</div>
    </div>
  `;
}

// ===== 回答 =====
function answer(v, correct){
  const r = document.getElementById("result");

  if(v===correct){
    r.innerText="⭕ 正解";
  }else{
    r.innerText="❌ 不正解";
  }
}

// ===== 初期表示 =====
showHome();

</script></body>
</html>
