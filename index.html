<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI 音声版</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:#222;
  padding:20px;
  border-radius:15px;
  text-align:center;
  width:90%;
  max-width:400px;
}
button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:#fff;
}
select{
  padding:10px;
  border-radius:10px;
  margin:10px;
}
textarea{
  width:100%;
  height:80px;
  border-radius:10px;
  padding:10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>🎤 徹子AI 音声</h2>

  <textarea id="text">こんにちは、徹子です。</textarea>

  <br>

  <select id="mode">
    <option value="eleven">ElevenLabs</option>
    <option value="browser">ブラウザ音声</option>
  </select>

  <br>

  <button onclick="unlockAudio()">① 初回タップ</button>
  <button onclick="speak()">再生</button>
</div>

<script>
let unlocked = false;

function unlockAudio(){
  const a = new Audio();
  a.src = "";
  a.play().catch(()=>{});
  unlocked = true;
  alert("音声解放OK");
}

async function speak(){
  if(!unlocked){
    alert("先に①初回タップして");
    return;
  }

  const text = document.getElementById("text").value;
  const mode = document.getElementById("mode").value;

  if(!text){
    alert("テキストが空です");
    return;
  }

  if(mode === "browser"){
    const uttr = new SpeechSynthesisUtterance(text);
    uttr.pitch = 1.2;
    uttr.rate = 1;
    speechSynthesis.speak(uttr);
  } else {
    try{
      const res = await fetch("/api/speak", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ text })
      });

      if(!res.ok){
        throw new Error("APIエラー");
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);

      const audio = new Audio(url);
      audio.play();

    }catch(e){
      console.error(e);
      alert("音声エラー（APIまたはIDを確認）");
    }
  }
}
</script>

</body>
</html>
