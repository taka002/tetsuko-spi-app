<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI SPI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#1f2a44,#0a3d62,#0f2027);
  color:#fff;
}

.header{
  padding:16px;
  text-align:center;
  background:rgba(255,255,255,0.05);
}

.main{
  padding:15px;
  padding-bottom:100px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
}

.btn{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  padding:16px;
  border-radius:15px;
  margin-top:12px;
  text-align:center;
  font-weight:bold;
}

.btn.disabled{
  opacity:0.4;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}
</style>
</head>

<body>

<div class="header">📱 徹子AI SPI</div>
<div class="main" id="screen"></div>

<div class="nav">
  <div onclick="changeTab('home')">🏠</div>
  <div onclick="changeTab('study')">📚</div>
</div>

<script>

const screen = document.getElementById("screen");

// ===== データ
let currentQ=null;
let answered=false;

// ===== 苦手データ
function recordWeak(type, ok){
  let data=JSON.parse(localStorage.getItem("weak"))||{
    calc:{ok:0,ng:0},
    percent:{ok:0,ng:0},
    ratio:{ok:0,ng:0}
  };

  if(ok) data[type].ok++;
  else data[type].ng++;

  localStorage.setItem("weak",JSON.stringify(data));
}

// ===== 問題生成
function makeQ(q,correct,type){
  let choices=[correct,correct+1,correct-1,correct+2]
    .sort(()=>Math.random()-0.5);

  return {
    q,
    choices,
    correct:choices.indexOf(correct),
    exp:`答えは ${correct}`,
    type
  };
}

function genMath(){
  const type=Math.floor(Math.random()*3);

  if(type===0){
    let a=Math.floor(Math.random()*20)+1;
    let b=Math.floor(Math.random()*20)+1;
    return makeQ(`${a}+${b}=?`,a+b,"calc");
  }

  if(type===1){
    let base=100+Math.floor(Math.random()*200);
    let per=[10,20,25,30][Math.floor(Math.random()*4)];
    return makeQ(`${base}の${per}%は？`,base*per/100,"percent");
  }

  if(type===2){
    return makeQ(`A:B=2:3 合計50 Aは？`,20,"ratio");
  }
}

// ===== 画面
function changeTab(tab){

  if(tab==="home"){
    screen.innerHTML=`
    <div class="card">
      <h2>SPIトレーニング</h2>
      <p>モード：非言語</p>
      <div class="btn" onclick="changeTab('study')">▶ 学習開始</div>
    </div>
    <div class="card">
      <h3>苦手分析</h3>
      ${showWeak()}
    </div>`;
  }

  if(tab==="study"){
    let q=genMath();
    currentQ=q;
    answered=false;

    screen.innerHTML=`
    <div class="card">
      <h2>${q.q}</h2>

      ${q.choices.map((c,i)=>
        `<div class="btn" id="btn${i}" onclick="answer(${i})">${c}</div>`
      ).join("")}

      <div class="btn" onclick="answer('skip')">🤔 分からない</div>

      <p id="result"></p>
    </div>`;
  }
}

// ===== 回答
function answer(i){

  if(answered) return;
  answered=true;

  const result=document.getElementById("result");

  // ボタン無効化
  document.querySelectorAll(".btn").forEach(b=>{
    b.classList.add("disabled");
  });

  if(i==="skip"){
    result.innerText="🤔 分からない\n";
    result.innerText += currentQ.exp;
    recordWeak(currentQ.type,false);
  }
  else if(i===currentQ.correct){
    result.innerText="⭕ 正解\n";
    result.innerText += currentQ.exp;
    recordWeak(currentQ.type,true);
  }
  else{
    result.innerText="❌ 不正解\n";
    result.innerText += currentQ.exp;
    recordWeak(currentQ.type,false);
  }

  // 次へ
  result.innerHTML += `
    <div class="btn" onclick="changeTab('study')">次の問題 ▶</div>
  `;
}

// ===== 苦手表示
function showWeak(){
  let d=JSON.parse(localStorage.getItem("weak"))||{};
  let html="";

  Object.keys(d).forEach(k=>{
    let total=d[k].ok+d[k].ng;
    let rate=total?Math.floor(d[k].ok/total*100):0;
    html+=`<p>${k}：${rate}%</p>`;
  });

  return html || "データなし";
}

// 初期
changeTab("home");

</script>

</body>
</html>
