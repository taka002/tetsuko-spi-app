<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI SPI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#1f2a44,#0a3d62,#0f2027);
  color:#fff;
}

.header{
  padding:16px;
  text-align:center;
  background:rgba(255,255,255,0.05);
}

.main{
  padding:15px;
  padding-bottom:100px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
}

.btn{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  padding:16px;
  border-radius:15px;
  margin-top:12px;
  text-align:center;
  font-weight:bold;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}
</style>
</head>

<body>

<div class="header">📱 徹子AI SPI</div>
<div class="main" id="screen"></div>

<div class="nav">
  <div onclick="changeTab('home')">🏠</div>
  <div onclick="changeTab('study')">📚</div>
</div>

<script>

// ===== 重要（これ忘れると真っ白になる）
const screen = document.getElementById("screen");

// ===== データ
let user={xp:0,level:1};
let combo=0;
let currentMode="非言語";
let currentQ=null;

// ===== XP
function nextXP(){return user.level*50;}
function addXP(v){
  user.xp+=v;
  if(user.xp>=nextXP()){
    user.xp=0;
    user.level++;
  }
}

// ===== 問題生成
function makeQ(q,correct){
  let choices=[correct,correct+1,correct-1,correct+2]
    .sort(()=>Math.random()-0.5);

  return {
    q,
    choices,
    correct:choices.indexOf(correct),
    exp:`答えは ${correct}`
  };
}

function genMath(){
  const type=Math.floor(Math.random()*3);

  // 足し算
  if(type===0){
    let a=Math.floor(Math.random()*20)+1;
    let b=Math.floor(Math.random()*20)+1;
    return makeQ(`${a}+${b}=?`,a+b);
  }

  // 割合
  if(type===1){
    let a=200;
    let b=20;
    return makeQ(`${a}の${b}%は？`,a*b/100);
  }

  // 比
  if(type===2){
    return makeQ(`A:B=2:3 合計50 Aは？`,20);
  }
}

function getQ(){
  return genMath();
}

// ===== 画面
function changeTab(tab){

  if(tab==="home"){
    screen.innerHTML=`
    <div class="card">
      <h2>SPIトレーニング</h2>
      <p>モード：非言語</p>
      <div class="btn" onclick="changeTab('study')">▶ 学習開始</div>
    </div>`;
  }

  if(tab==="study"){
    let q=getQ();
    currentQ=q;

    screen.innerHTML=`
    <div class="card">
      <h2>${q.q}</h2>

      ${q.choices.map((c,i)=>
        `<div class="btn" onclick="answer(${i})">${c}</div>`
      ).join("")}

      <p id="result"></p>
    </div>`;
  }
}

// ===== 回答（強化版）
function answer(i){
  const result=document.getElementById("result");

  if(i===currentQ.correct){
    result.innerText="⭕ 正解\n";
  }else{
    result.innerText="❌ 不正解\n";
  }

  // 解説
  result.innerText += currentQ.exp;

  // 次へ
  result.innerHTML += `
    <div class="btn" onclick="changeTab('study')">次の問題 ▶</div>
  `;
}

// ===== 初期表示
changeTab("home");

</script>

</body>
</html>
