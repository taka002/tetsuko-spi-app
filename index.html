<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI SPI</title>

<style>

/* ===== 重要（崩れ防止） ===== */
*{ box-sizing:border-box; }
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,#1f2a44,#0a3d62,#0f2027);
  color:#fff;
  overflow-x:hidden;
}

/* ===== スプラッシュ ===== */
#splash{
  position:fixed;width:100%;height:100%;
  background:linear-gradient(#0f2027,#203a43);
  display:flex;justify-content:center;align-items:center;
  z-index:9999;
}
.glow{
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,#00f2fe,transparent);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{transform:scale(0.8);}
  50%{transform:scale(1.3);}
  100%{transform:scale(0.8);}
}

/* ===== UI ===== */
.header{
  padding:18px;
  text-align:center;
  background:rgba(255,255,255,0.05);
}

.main{
  padding:15px;
  padding-bottom:100px;
  max-width:500px;
  margin:auto;
}

.card{
  width:100%;
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
  backdrop-filter:blur(10px);
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.btn{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  padding:16px;
  border-radius:15px;
  margin-top:12px;
  text-align:center;
  font-weight:600;
}

.progress{
  height:10px;
  background:#333;
  border-radius:10px;
}
.bar{
  height:100%;
  background:linear-gradient(90deg,#00f2fe,#4facfe);
  border-radius:10px;
}

/* ===== カレンダー ===== */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
  margin-top:10px;
}
.day{
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#222;
  border-radius:8px;
  font-size:12px;
}
.done{ background:#00f2fe; color:#000; }
.today{ border:2px solid #fff; }

/* ===== ナビ ===== */
.nav{
  position:fixed;bottom:0;width:100%;
  background:#111;
  display:flex;justify-content:space-around;
  padding:10px 0;
}
.active{color:#00f2fe;}

</style>
</head>

<body>

<!-- ===== スプラッシュ ===== -->
<div id="splash">
  <div style="text-align:center">
    <div class="glow"></div>
    <h1>徹子AI</h1>
    <p>タップして開始</p>
  </div>
</div>

<div class="header">📱 徹子AI SPI</div>
<div class="main" id="screen"></div>

<div class="nav">
  <div onclick="changeTab('home', this)" class="active">🏠</div>
  <div onclick="changeTab('study', this)">📚</div>
</div>

<script>

// ===== 音声 =====
function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

// ===== 起動 =====
window.onload = () => {
  const splash=document.getElementById("splash");
  splash.onclick=()=>{
    speak("こんにちは、徹子です");
    splash.style.display="none";
    updateLogin();
    render();
  };
};

// ===== データ =====
let user = JSON.parse(localStorage.getItem("user")) || {xp:0,level:1};
let combo = 0;
let current = 0;

// ===== XP =====
function nextXP(){ return user.level * 50; }

function addXP(v){
  user.xp += v;

  if(user.xp >= nextXP()){
    user.xp = 0;
    user.level++;
    speak("レベルアップ");
  }

  save();
}

// ===== ログイン =====
function getLoginData(){
  return JSON.parse(localStorage.getItem("login")) || {};
}

function updateLogin(){
  let login=getLoginData();
  login[new Date().toDateString()] = true;
  localStorage.setItem("login",JSON.stringify(login));
}

function getStreak(){
  let login=getLoginData();
  let count=0;
  let d=new Date();

  while(login[d.toDateString()]){
    count++;
    d.setDate(d.getDate()-1);
  }
  return count;
}

// ===== カレンダー =====
function renderCalendar(){
  let login=getLoginData();
  let html="<div class='calendar'>";

  for(let i=6;i>=0;i--){
    let d=new Date();
    d.setDate(d.getDate()-i);

    let cls="day";
    if(login[d.toDateString()]) cls+=" done";
    if(i===0) cls+=" today";

    html+=`<div class="${cls}">${d.getDate()}</div>`;
  }

  return html+"</div>";
}

// ===== デイリー =====
function getDaily(){
  const today=new Date().toDateString();
  let d=JSON.parse(localStorage.getItem("daily"))||{date:today,count:0,done:false};

  if(d.date!==today){
    localStorage.setItem("yesterday",JSON.stringify(d));
    d={date:today,count:0,done:false};
  }

  localStorage.setItem("daily",JSON.stringify(d));
  return d;
}

function getYesterday(){
  return JSON.parse(localStorage.getItem("yesterday")) || {count:0,done:false};
}

function addDaily(){
  let d=getDaily();
  d.count++;

  if(d.count>=5 && !d.done){
    d.done=true;
    speak("ミッション達成");
    addXP(20);
  }

  localStorage.setItem("daily",JSON.stringify(d));
}

// ===== SPI問題 =====
let questions=[

  {type:"言語",q:"「迅速」の意味は？",choices:["遅い","素早い","重い","弱い"],correct:1,explanation:"迅速＝すばやい"},
  {type:"非言語",q:"20%引きで800円。元値は？",choices:["900","1000","1200","1600"],correct:1,explanation:"800÷0.8=1000"},
  {type:"論理",q:"A>B、B>C。最も低いのは？",choices:["A","B","C","不明"],correct:2,explanation:"A>B>C"}

];

// ===== 画面 =====
function changeTab(tab,el){
  const screen=document.getElementById("screen");

  const percent=Math.floor((user.xp/nextXP())*100);
  const daily=getDaily();
  const yesterday=getYesterday();

  let html="";

  if(tab==="home"){
    html=`
    <div class="card">
      <h2>Lv.${user.level}</h2>
      <p>あと ${nextXP()-user.xp} XP</p>
      <div class="progress"><div class="bar" style="width:${percent}%"></div></div>
    </div>

    <div class="card">
      <h3>🔥 連続ログイン ${getStreak()}日</h3>
      ${renderCalendar()}
    </div>

    <div class="card">
      <h3>🎯 今日</h3>
      <p>${daily.count}/5</p>
      ${daily.done ? "<p>🎉 完了！</p>" : ""}
    </div>

    <div class="card">
      <h3>📅 昨日</h3>
      <p>${yesterday.count}/5</p>
      ${yesterday.done ? "<p>✔ 達成済み</p>" : "<p>未達成</p>"}
    </div>

    <div class="btn" onclick="changeTab('study',document.querySelectorAll('.nav div')[1])">
      ▶ 学習スタート
    </div>
    `;
  }

  if(tab==="study"){
    const q=questions[current];

    html=`
    <div class="card">
      <p>${q.type}</p>
      <h2>${q.q}</h2>

      ${q.choices.map((c,i)=>
        `<div class="btn" onclick="answer(${i})">${c}</div>`
      ).join("")}

      <p id="result"></p>
      <p id="explain"></p>
      <p>🔥 コンボ ${combo}</p>
    </div>
    `;
  }

  screen.innerHTML=html;

  document.querySelectorAll(".nav div").forEach(e=>e.classList.remove("active"));
  if(el) el.classList.add("active");
}

// ===== 判定 =====
function answer(i){
  const q=questions[current];

  const result=document.getElementById("result");
  const explain=document.getElementById("explain");

  if(i===q.correct){
    result.innerText="⭕ 正解";
    combo++;
    addXP(10+combo);
  }else{
    result.innerText="❌ 不正解";
    combo=0;
    addXP(2);
  }

  explain.innerText=q.explanation;

  addDaily();
  updateLogin();

  current = (current+1) % questions.length;
}

// ===== 保存 =====
function save(){
  localStorage.setItem("user",JSON.stringify(user));
}

// ===== 初期描画 =====
function render(){
  changeTab("home",document.querySelector(".nav div"));
}

</script>

</body>
</html>
