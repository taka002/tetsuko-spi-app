<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#111;
  color:#fff;
}

/* テーマ */
body.light{ background:#f5f5f5; color:#111; }
body.blue{ background:#0d1b2a; color:#fff; }

/* ヘッダー */
.header{
  padding:15px;
  text-align:center;
  background:#1c1c1c;
}

/* メイン */
.main{
  padding:15px;
  padding-bottom:80px;
}

/* カード */
.card{
  background:#222;
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
}
body.light .card{ background:#fff; }
body.blue .card{ background:#1b263b; }

/* ボタン */
.btn{
  background:#4caf50;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  text-align:center;
}

/* 下タブ */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1c1c1c;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.nav div{
  color:#aaa;
  font-size:12px;
}

.active{
  color:#4caf50;
}

input, select{
  width:100%;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">📱 徹子AI</div>

<div class="main" id="screen"></div>

<div class="nav">
  <div onclick="changeTab('home')" class="active">🏠<br>ホーム</div>
  <div onclick="changeTab('study')">📚<br>学習</div>
  <div onclick="changeTab('ai')">🤖<br>AI</div>
  <div onclick="changeTab('setting')">⚙️<br>設定</div>
</div>

<script>
// 🔥 保存データ
let settings = JSON.parse(localStorage.getItem("settings")) || {
  theme:"dark",
  personality:"normal",
  examDate:""
};

// 🔥 初期反映
applyTheme();

// 画面切り替え
function changeTab(tab){
  let html = "";

  if(tab === "home"){
    html = `
    <div class="card">
      <h3>今日の一言</h3>
      <p>${getMessage()}</p>
    </div>

    <div class="card">
      <h3>試験まで</h3>
      <p>${getCountdown()}</p>
    </div>
    `;
  }

  if(tab === "study"){
    html = `
    <div class="card">
      <h3>学習</h3>
      <p>ここに問題表示（次で作る）</p>
    </div>
    `;
  }

  if(tab === "ai"){
    html = `
    <div class="card">
      <h3>AI相談</h3>
      <p>ここも次で強化する</p>
    </div>
    `;
  }

  if(tab === "setting"){
    html = `
    <div class="card">
      <h3>テーマ</h3>
      <select onchange="setTheme(this.value)">
        <option value="dark">ダーク</option>
        <option value="blue">ブルー</option>
        <option value="light">ライト</option>
      </select>
    </div>

    <div class="card">
      <h3>徹子の性格</h3>
      <select onchange="setPersonality(this.value)">
        <option value="normal">優しい</option>
        <option value="strict">厳しい</option>
        <option value="friend">フレンドリー</option>
      </select>
    </div>

    <div class="card">
      <h3>試験日</h3>
      <input type="date" onchange="setExam(this.value)">
    </div>
    `;
  }

  document.getElementById("screen").innerHTML = html;

  document.querySelectorAll(".nav div").forEach(el=>el.classList.remove("active"));
  event.target.classList.add("active");
}

// 🔥 テーマ
function setTheme(t){
  settings.theme = t;
  save();
  applyTheme();
}

function applyTheme(){
  document.body.className = settings.theme;
}

// 🔥 性格
function setPersonality(p){
  settings.personality = p;
  save();
}

// 🔥 試験日
function setExam(date){
  settings.examDate = date;
  save();
}

// 🔥 メッセージ
function getMessage(){
  if(settings.personality === "strict"){
    return "甘えはダメよ。やるべきことをやりなさい。";
  }
  if(settings.personality === "friend"){
    return "いい感じじゃん！その調子でいこう🔥";
  }
  return "無理しなくていいのよ。でも一歩は進みましょうね。";
}

// 🔥 カウントダウン
function getCountdown(){
  if(!settings.examDate) return "未設定";

  const today = new Date();
  const exam = new Date(settings.examDate);
  const diff = Math.ceil((exam - today)/(1000*60*60*24));

  return "あと " + diff + " 日";
}

// 保存
function save(){
  localStorage.setItem("settings", JSON.stringify(settings));
}

// 初期表示
changeTab("home");
</script>

</body>
</html>
