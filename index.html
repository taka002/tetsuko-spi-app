<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI 音声版</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:#222;
  padding:20px;
  border-radius:15px;
  text-align:center;
  width:90%;
  max-width:400px;
}
button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:#fff;
}
textarea{
  width:100%;
  height:80px;
  border-radius:10px;
  padding:10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>🎤 徹子AI（軽量版）</h2>

  <textarea id="text">こんにちは、徹子です。</textarea>

  <br>

  <button onclick="unlockAudio()">① 初回タップ</button>
  <button onclick="speak()">再生</button>
</div>

<script>
let unlocked = false;

function unlockAudio(){
  const a = new Audio();
  a.src = "";
  a.play().catch(()=>{});
  unlocked = true;
  alert("音声OK");
}

function speak(){
  if(!unlocked){
    alert("先に①押して");
    return;
  }

  const text = document.getElementById("text").value;

  const uttr = new SpeechSynthesisUtterance(text);

  // 🔥 ここが調整ポイント
  uttr.lang = "ja-JP";
  uttr.pitch = 1.2;
  uttr.rate = 1;

  speechSynthesis.speak(uttr);
}
</script>

</body>
</html>
