<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
}

/* 上部ヘッダー */
.header{
  padding:15px;
  text-align:center;
  font-size:20px;
  background:#1c1c1c;
}

/* メイン */
.main{
  padding:15px;
  padding-bottom:80px;
}

/* カード */
.card{
  background:#222;
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
}

/* ボタン */
.btn{
  background:#4caf50;
  padding:12px;
  border-radius:12px;
  text-align:center;
  margin-top:10px;
}

/* 下タブ */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1c1c1c;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.nav div{
  text-align:center;
  font-size:12px;
  color:#aaa;
}

.active{
  color:#4caf50;
}
</style>
</head>

<body>

<div class="header">📱 徹子AI</div>

<div class="main" id="screen">

  <!-- ホーム -->
  <div class="card">
    <h3>今日の一言</h3>
    <p>無理しなくていいのよ。でも一歩は進みましょうね。</p>
  </div>

  <div class="card">
    <h3>勉強時間</h3>
    <p>0分</p>
  </div>

  <div class="card">
    <h3>試験まで</h3>
    <p>あと30日</p>
  </div>

</div>

<!-- 下タブ -->
<div class="nav">
  <div onclick="changeTab('home')" class="active">🏠<br>ホーム</div>
  <div onclick="changeTab('study')">📚<br>学習</div>
  <div onclick="changeTab('ai')">🤖<br>AI</div>
  <div onclick="changeTab('calendar')">📅<br>記録</div>
</div>

<script>
function changeTab(tab){

  let html = "";

  if(tab === "home"){
    html = `
    <div class="card">
      <h3>今日の一言</h3>
      <p>無理しなくていいのよ。でも一歩は進みましょうね。</p>
    </div>

    <div class="card">
      <h3>勉強時間</h3>
      <p>0分</p>
    </div>

    <div class="card">
      <h3>試験まで</h3>
      <p>あと30日</p>
    </div>
    `;
  }

  if(tab === "study"){
    html = `
    <div class="card">
      <h3>SPI問題</h3>
      <p>ここに問題表示</p>
      <div class="btn">回答する</div>
    </div>
    `;
  }

  if(tab === "ai"){
    html = `
    <div class="card">
      <h3>AI相談</h3>
      <p>悩みを書いてください</p>
      <div class="btn">送信</div>
    </div>
    `;
  }

  if(tab === "calendar"){
    html = `
    <div class="card">
      <h3>学習記録</h3>
      <p>カレンダーここに</p>
    </div>
    `;
  }

  document.getElementById("screen").innerHTML = html;

  // アクティブ色変更
  document.querySelectorAll(".nav div").forEach(el => el.classList.remove("active"));
  event.target.classList.add("active");
}
</script>

</body>
</html>
