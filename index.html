<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI SPI 完全版</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#1f2a44,#0a3d62,#0f2027);
  color:#fff;
}

.header{
  padding:18px;
  text-align:center;
  background:rgba(255,255,255,0.05);
}

.main{
  padding:15px;
  padding-bottom:100px;
  max-width:500px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
}

.btn{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  padding:16px;
  border-radius:15px;
  margin-top:12px;
  text-align:center;
  font-weight:bold;
}

.progress{height:10px;background:#333;border-radius:10px;}
.bar{height:100%;background:linear-gradient(90deg,#00f2fe,#4facfe);border-radius:10px;}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}
</style>
</head>

<body>

<div class="header">📱 徹子AI SPI</div>
<div class="main" id="screen"></div>

<div class="nav">
  <div onclick="home()">🏠</div>
  <div onclick="studySelect()">📚</div>
  <div onclick="examMenu()">📝</div>
</div>

<script>

// ===== データ =====
let user=JSON.parse(localStorage.getItem("user"))||{xp:0,level:1};
let combo=0;
let currentMode="言語";
let currentQ=null;

// ===== XP =====
function nextXP(){return user.level*50;}
function addXP(v){
  user.xp+=v;
  if(user.xp>=nextXP()){
    user.xp=0;
    user.level++;
  }
  localStorage.setItem("user",JSON.stringify(user));
}

// ===== ランダム =====
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(a){return a.sort(()=>Math.random()-0.5);}

// ===== 言語 =====
function genWord(){
  const data=[
    ["迅速","素早い"],["慎重","注意深い"],["柔軟","対応できる"],
    ["簡潔","短い"],["誠実","正直"],["冷静","落ち着いている"]
  ];
  const wrong=["遅い","雑","弱い","不安定","軽い","乱暴"];

  let x=data[rand(0,data.length-1)];

  let c=[x[1]];
  while(c.length<4){
    let w=wrong[rand(0,wrong.length-1)];
    if(!c.includes(w)) c.push(w);
  }
  c=shuffle(c);

  return {q:`「${x[0]}」の意味は？`,choices:c,correct:c.indexOf(x[1]),exp:`${x[0]}＝${x[1]}`};
}

// ===== 非言語 =====
function genMath(){
  let type=rand(0,4),q,correct;

  if(type===0){let a=rand(5,20),b=rand(5,20);correct=a+b;q=`${a}+${b}`;}
  if(type===1){let a=rand(10,30),b=rand(1,10);correct=a-b;q=`${a}-${b}`;}
  if(type===2){let a=rand(2,9),b=rand(2,9);correct=a*b;q=`${a}×${b}`;}
  if(type===3){let b=rand(2,9);correct=rand(2,9);q=`${b*correct}÷${b}`;}
  if(type===4){let s=rand(1,5),d=rand(2,5);correct=s+d*3;q=`${s},${s+d},${s+d*2},?`;}

  let c=shuffle([correct,correct+1,correct-1,correct+2]);
  return {q:q,choices:c,correct:c.indexOf(correct),exp:`答え：${correct}`};
}

// ===== 性格 =====
function genPerson(){
  return {q:"あなたに近いのは？",choices:["計画型","直感型","協調型","単独型"],correct:null,exp:"記録用"};
}

// ===== 問題取得 =====
function getQ(){
  if(currentMode==="言語") return genWord();
  if(currentMode==="非言語") return genMath();
  return genPerson();
}

// ===== 学習 =====
function studySelect(){
  screen.innerHTML=`
  <div class="card">
    <h2>学習モード</h2>
    <div class="btn" onclick="startStudy('言語')">言語</div>
    <div class="btn" onclick="startStudy('非言語')">非言語</div>
    <div class="btn" onclick="startStudy('性格')">性格</div>
  </div>`;
}

function startStudy(m){
  currentMode=m;
  nextStudy();
}

function nextStudy(){
  let q=getQ();
  currentQ=q;

  screen.innerHTML=`
  <div class="card">
    <h2>${q.q}</h2>
    ${q.choices.map((c,i)=>`<div class="btn" onclick="answer(${i})">${c}</div>`).join("")}
    <p id="result"></p>
    <p id="exp"></p>
    <p>🔥 ${combo}</p>
    <div class="btn" onclick="nextStudy()">次へ</div>
  </div>`;
}

function answer(i){
  if(currentQ.correct===null){
    result.innerText="記録";
    exp.innerText=currentQ.exp;
    return;
  }

  if(i===currentQ.correct){
    result.innerText="⭕";
    combo++;
    addXP(10);
  }else{
    result.innerText="❌";
    combo=0;
  }
  exp.innerText=currentQ.exp;
}

// ===== 模擬試験 =====
let exam={};

function examMenu(){
  screen.innerHTML=`
  <div class="card">
    <h2>模擬試験</h2>
    <div class="btn" onclick="startExam('言語')">言語</div>
    <div class="btn" onclick="startExam('非言語')">非言語</div>
    <div class="btn" onclick="startExam('性格')">性格</div>
  </div>`;
}

function startExam(type){
  exam={type:type,total:10,current:0,correct:0,start:Date.now(),limit:90};
  currentMode=type;
  nextExam();
}

function nextExam(){
  let remain=exam.limit-Math.floor((Date.now()-exam.start)/1000);
  if(remain<=0||exam.current>=exam.total) return finishExam();

  let q=getQ();
  currentQ=q;

  screen.innerHTML=`
  <div class="card">
    <h3>⏱ ${remain}</h3>
    <p>${exam.current+1}/${exam.total}</p>
    <h2>${q.q}</h2>
    ${q.choices.map((c,i)=>`<div class="btn" onclick="answerExam(${i})">${c}</div>`).join("")}
  </div>`;

  setTimeout(nextExam,1000);
}

function answerExam(i){
  if(currentQ.correct!==null && i===currentQ.correct) exam.correct++;
  exam.current++;
  nextExam();
}

function finishExam(){
  let rate=Math.floor((exam.correct/exam.total)*100);
  screen.innerHTML=`
  <div class="card">
    <h2>結果</h2>
    <p>${exam.correct}/${exam.total}</p>
    <p>${rate}%</p>
    <h3>${judge(rate)}</h3>
    <div class="btn" onclick="home()">戻る</div>
  </div>`;
}

function judge(r){
  if(r>=80) return "S";
  if(r>=60) return "A";
  if(r>=40) return "B";
  return "C";
}

// ===== ホーム =====
function home(){
  let p=Math.floor((user.xp/nextXP())*100);
  screen.innerHTML=`
  <div class="card">
    <h2>Lv.${user.level}</h2>
    <p>${user.xp}/${nextXP()}</p>
    <div class="progress"><div class="bar" style="width:${p}%"></div></div>
  </div>
  `;
}

home();

</script>
</body>
</html>
