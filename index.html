<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI SPI</title><style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,#1f2a44,#0a3d62,#0f2027);
  color:#fff;
}
#splash{
  position:fixed;width:100%;height:100%;
  background:linear-gradient(#0f2027,#203a43);
  display:flex;justify-content:center;align-items:center;
  z-index:9999;
}
.glow{
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,#00f2fe,transparent);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{transform:scale(0.8);}
  50%{transform:scale(1.3);}
  100%{transform:scale(0.8);}
}
.header{
  padding:18px;text-align:center;
  background:rgba(255,255,255,0.05);
}
.main{padding:15px;padding-bottom:100px;}
.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
}
.btn{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  padding:16px;
  border-radius:15px;
  margin-top:12px;
  text-align:center;
  font-weight:bold;
}
.progress{height:10px;background:#333;border-radius:10px;}
.bar{height:100%;background:linear-gradient(90deg,#00f2fe,#4facfe);}
canvas{
  width:100%;height:200px;background:#111;border-radius:10px;margin-top:10px;
}
.nav{
  position:fixed;bottom:0;width:100%;
  background:#111;
  display:flex;justify-content:space-around;
  padding:10px 0;
}
.active{color:#00f2fe;}
</style></head><body><div id="splash" onclick="startApp()">
  <div style="text-align:center">
    <div class="glow"></div>
    <h1>徹子AI SPI</h1>
    <p>タップして開始</p>
  </div>
</div><div class="header">📱 徹子AI SPI</div>
<div class="main" id="screen"></div><div class="nav">
  <div onclick="changeTab('home', this)" class="active">🏠</div>
  <div onclick="changeTab('study', this)">📚</div>
  <div onclick="showWeak()">📊</div>
</div><script>

// ===== データ =====
let user = JSON.parse(localStorage.getItem("user")) || {xp:0,level:1};
let combo=0;
let mode=null;
let qIndex=0;
let totalQ=10;
let currentQ=null;

// ===== 起動 =====
function startApp(){
  splash.style.display="none";
  render();
}

// ===== XP =====
function nextXP(){return user.level*50;}
function addXP(v){
  user.xp+=v;
  if(user.xp>=nextXP()){
    user.xp=0;
    user.level++;
  }
  localStorage.setItem("user",JSON.stringify(user));
}

// ===== 苦手 =====
function recordWeak(m,ok){
  let d=JSON.parse(localStorage.getItem("weak"))||{
    言語:{ok:0,ng:0},非言語:{ok:0,ng:0},性格:{ok:0,ng:0}
  };
  ok?d[m].ok++:d[m].ng++;
  localStorage.setItem("weak",JSON.stringify(d));
}

function showWeak(){
  let d=JSON.parse(localStorage.getItem("weak"))||{};
  screen.innerHTML=`
  <div class="card">
    <h2>苦手分析</h2>
    ${Object.keys(d).map(k=>{
      let t=d[k].ok+d[k].ng;
      let r=t?Math.floor(d[k].ok/t*100):0;
      return `<p>${k}：${r}%</p>`;
    }).join("")}
  </div>`;
}

// ===== 問題生成 =====
function genWord(){
  const list=[
    ["迅速","素早い"],
    ["慎重","注意深い"],
    ["曖昧","不明確"],
    ["顕著","目立つ"],
    ["簡潔","短く分かりやすい"]
  ];
  let x=list[Math.floor(Math.random()*list.length)];
  let choices=[x[1],"遅い","弱い","重い"].sort(()=>Math.random()-0.5);
  return {q:`「${x[0]}」の意味は？`,choices,correct:choices.indexOf(x[1]),exp:`${x[0]}＝${x[1]}`};
}

function genMath(){
  let a=Math.floor(Math.random()*30)+1;
  let b=Math.floor(Math.random()*30)+1;
  let c=a+b;
  let choices=[c,c+1,c-1,c+2].sort(()=>Math.random()-0.5);
  return {q:`${a}+${b}=?`,choices,correct:choices.indexOf(c),exp:`${a}+${b}=${c}`};
}

function genPerson(){
  return {q:"あなたに近いのは？",
    choices:["計画型","直感型","協調型","単独型"],
    correct:null,exp:"記録しました"};
}

function getQ(){
  if(mode==="言語")return genWord();
  if(mode==="非言語")return genMath();
  return genPerson();
}

// ===== モード開始 =====
function startMode(m){
  mode=m;
  qIndex=0;
  nextQuestion();
}

// ===== 問題進行 =====
function nextQuestion(){
  if(qIndex>=totalQ){
    screen.innerHTML=`<div class="card"><h2>終了</h2><p>お疲れ様</p></div>`;
    return;
  }
  currentQ=getQ();
  qIndex++;

  screen.innerHTML=`
  <div class="card">
    <h2>Q${qIndex}/${totalQ}</h2>
    <h3>${currentQ.q}</h3>
    ${currentQ.choices.map((c,i)=>`<div class="btn" onclick="answer(${i})">${c}</div>`).join("")}
    <div class="btn" onclick="answer('skip')">🤔 分からない</div>
    <p id="result"></p>
    <p id="exp"></p>
    <p>🔥 コンボ ${combo}</p>
    <canvas id="memo"></canvas>
    <div class="btn" onclick="clearMemo()">メモ消す</div>
  </div>`;
  
  setTimeout(initMemo,100);
}

// ===== 回答 =====
function answer(i){

  if(currentQ.correct===null){
    result.innerText="記録";
    exp.innerText=currentQ.exp;
    setTimeout(nextQuestion,1000);
    return;
  }

  if(i==="skip"){
    result.innerText="🤔";
    exp.innerText=currentQ.exp;
    combo=0;
    setTimeout(nextQuestion,1000);
    return;
  }

  if(i===currentQ.correct){
    result.innerText="⭕";
    combo++;
    addXP(10+combo);
    recordWeak(mode,true);
  }else{
    result.innerText="❌";
    combo=0;
    recordWeak(mode,false);
  }

  exp.innerText=currentQ.exp;
  setTimeout(nextQuestion,1000);
}

// ===== メモ =====
function initMemo(){
  const c=document.getElementById("memo");
  const ctx=c.getContext("2d");
  c.width=c.offsetWidth;
  c.height=c.offsetHeight;
  let d=false;

  c.addEventListener("touchstart",()=>d=true);
  c.addEventListener("touchmove",e=>{
    if(!d)return;
    let t=e.touches[0];
    let r=c.getBoundingClientRect();
    ctx.lineTo(t.clientX-r.left,t.clientY-r.top);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(t.clientX-r.left,t.clientY-r.top);
  });
  c.addEventListener("touchend",()=>d=false);
}

function clearMemo(){
  let c=document.getElementById("memo");
  c.getContext("2d").clearRect(0,0,c.width,c.height);
}

// ===== 画面 =====
function changeTab(tab,el){
  if(tab==="home"){
    screen.innerHTML=`
    <div class="card">
      <h2>Lv.${user.level}</h2>
      <p>XP ${user.xp}/${nextXP()}</p>
    </div>

    <div class="card">
      <h3>モード選択</h3>
      <div class="btn" onclick="startMode('言語')">言語</div>
      <div class="btn" onclick="startMode('非言語')">非言語</div>
      <div class="btn" onclick="startMode('性格')">性格</div>
    </div>`;
  }

  document.querySelectorAll(".nav div").forEach(e=>e.classList.remove("active"));
  if(el) el.classList.add("active");
}

// ===== 初期 =====
function render(){
  changeTab("home",document.querySelector(".nav div"));
}

</script></body>
</html>
