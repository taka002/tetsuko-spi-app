<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,#1e1e2f,#0f2027);
  color:#fff;
}

/* ===== スプラッシュ ===== */
#splash{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.splash-inner{
  text-align:center;
}

.glow{
  width:120px;
  height:120px;
  border-radius:50%;
  background:radial-gradient(circle,#00f2fe,transparent);
  margin:0 auto 20px;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{ transform:scale(0.8); opacity:0.6; }
  50%{ transform:scale(1.2); opacity:1; }
  100%{ transform:scale(0.8); opacity:0.6; }
}

.loader{
  width:40px;
  height:40px;
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid #00f2fe;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

/* ===== UI ===== */

.header{
  padding:18px;
  text-align:center;
  font-size:18px;
  font-weight:600;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

.main{
  padding:15px;
  padding-bottom:90px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:25px;
  padding:20px;
  margin-bottom:15px;
  box-shadow:
    0 10px 25px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.1);
}

.btn{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  padding:14px;
  border-radius:15px;
  margin-top:12px;
  text-align:center;
  font-weight:600;
  box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.nav div{
  color:#aaa;
  font-size:12px;
}

.active{
  color:#00f2fe;
}
</style>
</head>

<body>

<!-- 🔥 スプラッシュ -->
<div id="splash">
  <div class="splash-inner">
    <div class="glow"></div>
    <h1>徹子AI</h1>
    <p>あなた専属の家庭教師</p>
    <div class="loader"></div>
  </div>
</div>

<div class="header">📱 徹子AI</div>
<div class="main" id="screen"></div>

<div class="nav">
  <div onclick="changeTab('home', this)" class="active">🏠<br>ホーム</div>
  <div onclick="changeTab('study', this)">📚<br>学習</div>
</div>

<script>

// ===== スプラッシュ終了 =====
window.onload = () => {
  setTimeout(()=>{
    document.getElementById("splash").style.display="none";
  },2000);
};

// ===== 音声 =====
function speakText(text){
  const uttr=new SpeechSynthesisUtterance(text);
  uttr.lang="ja-JP";
  speechSynthesis.speak(uttr);
}

// ===== 問題 =====
let questions=[
  {q:"3 + 5 = ?",choices:["6","7","8","9"],correct:2,explanation:"3+5=8です"}
];

let current=0;

// ===== 画面 =====
function changeTab(tab,el){
  let html="";

  if(tab==="home"){
    html=`
    <div class="card">
      <h3>今日の一言</h3>
      <p>今日も一歩進みましょう</p>
    </div>`;
  }

  if(tab==="study"){
    const q=questions[current];

    html=`
    <div class="card">
      <h3>問題</h3>
      <p>${q.q}</p>

      ${q.choices.map((c,i)=>
        `<div class="btn" onclick="answer(${i})">${c}</div>`
      ).join("")}

      <p id="result"></p>
      <div id="explain"></div>

      <div class="btn" onclick="aiExplain()">🤖 AI解説</div>

      <input id="deepInput" placeholder="どこが分からない？">
      <div class="btn" onclick="deepExplain()">🔍 深掘り</div>

      <div class="btn" onclick="nextQuestion()">次</div>
    </div>`;
  }

  document.getElementById("screen").innerHTML=html;
  document.querySelectorAll(".nav div").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
}

// ===== 判定 =====
function answer(i){
  const q=questions[current];

  if(i===q.correct){
    result.innerText="⭕ 正解";
    speakText("正解よ");
  }else{
    result.innerText="❌ 不正解";
    speakText("違うわね");
  }

  explain.innerHTML=q.explanation;
}

// ===== AI =====
async function aiExplain(){
  const q=questions[current];
  explain.innerText="AI解説中...";

  const res=await fetch("/api/explain",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({question:q.q})
  });

  const data=await res.json();
  explain.innerHTML=data.reply;
}

// ===== 深掘り =====
async function deepExplain(){
  const q=questions[current];
  const userQ=document.getElementById("deepInput").value;

  explain.innerText="深掘り中...";

  const res=await fetch("/api/explain",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      question:`問題:${q.q} 質問:${userQ}`
    })
  });

  const data=await res.json();
  explain.innerHTML=data.reply;
}

// ===== 次 =====
function nextQuestion(){
  changeTab("study",document.querySelectorAll(".nav div")[1]);
}

// 初期
changeTab("home",document.querySelector(".nav div"));
</script>

</body>
</html>
