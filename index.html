<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#111;
  color:#fff;
}

/* テーマ */
body.light{ background:#f5f5f5; color:#111; }
body.blue{ background:#0d1b2a; color:#fff; }

/* ヘッダー */
.header{
  padding:15px;
  text-align:center;
  background:#1c1c1c;
}

/* メイン */
.main{
  padding:15px;
  padding-bottom:80px;
}

/* カード */
.card{
  background:#222;
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
}
body.light .card{ background:#fff; }
body.blue .card{ background:#1b263b; }

/* ボタン */
.btn{
  background:#4caf50;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  text-align:center;
}

/* 下タブ */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1c1c1c;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.nav div{
  color:#aaa;
  font-size:12px;
}

.active{
  color:#4caf50;
}

input, select{
  width:100%;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">📱 徹子AI</div>

<div class="main" id="screen"></div>

<div class="nav">
  <div onclick="changeTab('home', this)" class="active">🏠<br>ホーム</div>
  <div onclick="changeTab('study', this)">📚<br>学習</div>
  <div onclick="changeTab('ai', this)">🤖<br>AI</div>
  <div onclick="changeTab('setting', this)">⚙️<br>設定</div>
</div>

<script>
// 🔥 設定
let settings = JSON.parse(localStorage.getItem("settings")) || {
  theme:"dark",
  personality:"normal",
  examDate:"",
  voice:true
};

// 🔊 音声エンジン
let speaking = false;

function speakText(text){
  if(!settings.voice) return;

  if(speaking){
    speechSynthesis.cancel();
  }

  const uttr = new SpeechSynthesisUtterance(text);
  uttr.lang = "ja-JP";

  if(settings.personality === "strict"){
    uttr.pitch = 0.8;
    uttr.rate = 1.1;
  }
  else if(settings.personality === "friend"){
    uttr.pitch = 1.4;
    uttr.rate = 1;
  }
  else{
    uttr.pitch = 1.2;
    uttr.rate = 1;
  }

  speaking = true;
  uttr.onend = ()=> speaking = false;

  speechSynthesis.speak(uttr);
}

// 初期テーマ
applyTheme();

// 画面切り替え
function changeTab(tab, el){
  let html = "";

  if(tab === "home"){
    const msg = getMessage();
    html = `
    <div class="card">
      <h3>今日の一言</h3>
      <p>${msg}</p>
      <div class="btn" onclick="speakText('${msg}')">読み上げ</div>
    </div>

    <div class="card">
      <h3>試験まで</h3>
      <p>${getCountdown()}</p>
    </div>
    `;

    speakText(msg);
  }

  if(tab === "study"){
    html = `
    <div class="card">
      <h3>学習</h3>
      <p>ここに問題表示（次で作る）</p>
      <div class="btn" onclick="speakText('学習を始めましょう')">音声ガイド</div>
    </div>
    `;
  }

  if(tab === "ai"){
    html = `
    <div class="card">
      <h3>AI相談</h3>
      <input id="aiInput" placeholder="悩みを書く">
      <div class="btn" onclick="aiTalk()">送信</div>
      <p id="aiReply"></p>
    </div>
    `;
  }

  if(tab === "setting"){
    html = `
    <div class="card">
      <h3>テーマ</h3>
      <select onchange="setTheme(this.value)">
        <option value="dark">ダーク</option>
        <option value="blue">ブルー</option>
        <option value="light">ライト</option>
      </select>
    </div>

    <div class="card">
      <h3>徹子の性格</h3>
      <select onchange="setPersonality(this.value)">
        <option value="normal">優しい</option>
        <option value="strict">厳しい</option>
        <option value="friend">フレンドリー</option>
      </select>
    </div>

    <div class="card">
      <h3>音声</h3>
      <select onchange="setVoice(this.value)">
        <option value="on">ON</option>
        <option value="off">OFF</option>
      </select>
    </div>

    <div class="card">
      <h3>試験日</h3>
      <input type="date" onchange="setExam(this.value)">
    </div>
    `;
  }

  document.getElementById("screen").innerHTML = html;

  document.querySelectorAll(".nav div").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
}

// AI簡易
function aiTalk(){
  const text = document.getElementById("aiInput").value;
  const reply = "大丈夫よ、少しずつ進めばいいの。";

  document.getElementById("aiReply").innerText = reply;
  speakText(reply);
}

// 設定
function setTheme(t){
  settings.theme = t;
  save();
  applyTheme();
}

function applyTheme(){
  document.body.className = settings.theme;
}

function setPersonality(p){
  settings.personality = p;
  save();
}

function setVoice(v){
  settings.voice = (v === "on");
  save();
}

function setExam(d){
  settings.examDate = d;
  save();
}

// メッセージ
function getMessage(){
  if(settings.personality==="strict") return "甘えはダメよ。やりなさい。";
  if(settings.personality==="friend") return "いい感じじゃん！🔥";
  return "無理しなくていいのよ。でも一歩ね。";
}

// カウント
function getCountdown(){
  if(!settings.examDate) return "未設定";
  const d = Math.ceil((new Date(settings.examDate)-new Date())/(1000*60*60*24));
  return "あと "+d+" 日";
}

function save(){
  localStorage.setItem("settings", JSON.stringify(settings));
}

// 初期
changeTab("home", document.querySelector(".nav div"));
</script>

</body>
</html>
