<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI</title>

<style>
body{
  margin:0;
  font-family:-apple-system,sans-serif;
  background:linear-gradient(135deg,#1e1e2f,#0f2027);
  color:#fff;
}

/* スプラッシュ */
#splash{
  position:fixed;width:100%;height:100%;
  background:linear-gradient(#0f2027,#203a43);
  display:flex;justify-content:center;align-items:center;
  z-index:9999;
}
.glow{
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,#00f2fe,transparent);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{transform:scale(0.8);}
  50%{transform:scale(1.2);}
  100%{transform:scale(0.8);}
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;border-radius:20px;margin:10px;
}

.btn{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  padding:12px;border-radius:10px;margin-top:10px;text-align:center;
}

/* レベルアップ */
#levelUp{
  position:fixed;width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  display:none;justify-content:center;align-items:center;
  z-index:9999;
}

#stamp{
  position:fixed;
  top:40%;left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  font-size:80px;
  opacity:0;
  transition:0.3s;
}
</style>
</head>

<body>

<!-- スプラッシュ -->
<div id="splash" onclick="startApp()">
  <div style="text-align:center">
    <div class="glow"></div>
    <h1>徹子AI</h1>
    <p>タップして開始</p>
  </div>
</div>

<!-- レベルアップ -->
<div id="levelUp">
  <div class="card">
    <h2>🎉 LEVEL UP</h2>
    <p id="levelText"></p>
  </div>
</div>

<!-- スタンプ -->
<div id="stamp"></div>

<div id="screen"></div>

<script>

// ===== 音声 =====
function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

// ===== 起動 =====
function startApp(){
  speak("こんにちは、徹子です");
  splash.style.display="none";
}

// ===== RPG =====
let user = JSON.parse(localStorage.getItem("user")) || {
  xp:0,level:1
};

let combo = 0;

function nextXP(){
  return user.level * 50;
}

function addXP(v){
  user.xp += v;

  if(user.xp >= nextXP()){
    user.xp = 0;
    user.level++;
    showLevelUp();
  }

  save();
}

// ===== バッジ =====
function getBadge(){
  if(user.level>=50) return "👑 神";
  if(user.level>=10) return "🔥 中級者";
  if(user.level>=5) return "💪 頑張り屋";
  return "🌱 初心者";
}

// ===== レベルアップ =====
function showLevelUp(){
  levelText.innerText="Lv."+user.level;
  levelUp.style.display="flex";
  speak("レベルアップ");

  setTimeout(()=>{
    levelUp.style.display="none";
  },1500);
}

// ===== スタンプ =====
function showStamp(t){
  stamp.innerText=t;
  stamp.style.opacity=1;
  stamp.style.transform="translate(-50%,-50%) scale(1.5)";

  setTimeout(()=>{
    stamp.style.opacity=0;
    stamp.style.transform="translate(-50%,-50%) scale(0.5)";
  },400);
}

// ===== デイリー =====
function getDaily(){
  const today=new Date().toDateString();

  let d=JSON.parse(localStorage.getItem("daily"))||{
    date:today,count:0
  };

  if(d.date!==today){
    d={date:today,count:0};
  }

  localStorage.setItem("daily",JSON.stringify(d));
  return d;
}

function addDaily(){
  let d=getDaily();
  d.count++;
  localStorage.setItem("daily",JSON.stringify(d));
}

// ===== 問題 =====
let q={q:"3+5=?",c:["6","7","8","9"],a:2};

// ===== 画面 =====
function render(){

  const percent=Math.floor((user.xp/nextXP())*100);
  const daily=getDaily();

  screen.innerHTML=`
  <div class="card">
    <h3>Lv.${user.level} ${getBadge()}</h3>
    <p>${user.xp}/${nextXP()} XP</p>
    <div style="height:10px;background:#333;border-radius:10px;">
      <div style="width:${percent}%;height:100%;background:#00f2fe;"></div>
    </div>
  </div>

  <div class="card">
    <h3>🔥 デイリーミッション</h3>
    <p>${daily.count}/5 問</p>
  </div>

  <div class="card">
    <p>${q.q}</p>
    ${q.c.map((c,i)=>`<div class="btn" onclick="answer(${i})">${c}</div>`).join("")}
    <p id="result"></p>
  </div>
  `;
}

// ===== 判定 =====
function answer(i){

  if(i===q.a){
    result.innerText="⭕";
    combo++;
    addXP(10+combo);
    showStamp("⭕");
    speak("正解");
  }else{
    result.innerText="❌";
    combo=0;
    addXP(2);
    showStamp("❌");
  }

  addDaily();
  render();
}

// ===== 保存 =====
function save(){
  localStorage.setItem("user",JSON.stringify(user));
}

// 初期
render();

</script>
</body>
</html>
