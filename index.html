<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI App</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
}

/* ヘッダー */
.header{
  position:fixed;
  top:0;
  width:100%;
  padding:15px;
  background:#1c1c1c;
  text-align:center;
  font-weight:bold;
  z-index:10;
}

/* メイン */
.main{
  padding-top:60px;
  padding-bottom:80px;
}

/* カード */
.card{
  background:#fff;
  color:#000;
  margin:15px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  transition:0.3s;
}
.card:active{
  transform:scale(0.97);
}
.card img{
  width:100%;
}
.content{
  padding:15px;
}

/* ボタン */
.btn{
  margin:10px;
  padding:15px;
  background:#00c853;
  border-radius:12px;
  text-align:center;
  color:#fff;
}

/* AI */
.ai{
  display:none;
  padding:15px;
}
textarea{
  width:100%;
  height:80px;
  border-radius:10px;
  padding:10px;
}

/* タブバー */
.tabbar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#1c1c1c;
}
.tab{
  flex:1;
  padding:15px;
  text-align:center;
  color:#aaa;
}
.active{
  color:#00c853;
}
</style>
</head>

<body>

<div class="header">📱 徹子AI</div>

<div class="main" id="home">

  <!-- カード① -->
  <div class="card">
    <img src="https://via.placeholder.com/400x200">
    <div class="content">
      <h3>SPI対策アプリ</h3>
      <p>スキマ時間で効率よく学べる人気アプリ</p>
    </div>
  </div>

  <!-- カード② -->
  <div class="card">
    <img src="https://via.placeholder.com/400x200">
    <div class="content">
      <h3>英語学習アプリ</h3>
      <p>初心者でも続く神アプリ</p>
    </div>
  </div>

</div>

<!-- AI画面 -->
<div class="ai" id="ai">
  <h3>🤖 AI相談</h3>
  <textarea id="text">おすすめ教えて</textarea>
  <br><br>
  <button onclick="speak()">AIで回答</button>
</div>

<!-- タブ -->
<div class="tabbar">
  <div class="tab active" onclick="showTab('home', this)">🏠</div>
  <div class="tab" onclick="showTab('ai', this)">🤖</div>
</div>

<script>
let unlocked = false;

// タブ切替
function showTab(id, el){
  document.getElementById("home").style.display = "none";
  document.getElementById("ai").style.display = "none";

  document.getElementById(id).style.display = "block";

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

// AI音声
function speak(){
  const text = document.getElementById("text").value;

  const reply = "あなたにはこのアプリが合っていますよ。";

  document.getElementById("text").value = reply;

  const uttr = new SpeechSynthesisUtterance(reply);
  uttr.lang = "ja-JP";
  uttr.pitch = 1.2;

  speechSynthesis.speak(uttr);
}
</script>

</body>
</html>
